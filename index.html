<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aamusivu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.6;
            padding: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        section {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        section:last-child {
            border-bottom: none;
        }

        h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #333;
        }

        .weather-location {
            margin-bottom: 16px;
        }

        .location-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 8px;
        }

        .weather-card {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            background-color: #fafafa;
            border-radius: 6px;
        }

        .weather-time {
            font-size: 11px;
            font-weight: 500;
            color: #666;
            margin-bottom: 4px;
        }

        .weather-icon {
            font-size: 24px;
            margin: 6px 0;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .temp {
            font-size: 18px;
            font-weight: bold;
            color: #000;
        }

        .weather-desc {
            font-size: 10px;
            color: #666;
            margin-top: 2px;
        }

        .nameday {
            font-size: 14px;
            padding: 12px;
            background-color: #fafafa;
            border-left: 3px solid #333;
        }

        .comic {
            margin-bottom: 12px;
            padding: 12px;
            background-color: #fafafa;
            border-left: 3px solid #333;
        }

        .comic-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .comic-image {
            max-width: 100%;
            height: auto;
            display: block;
            margin-top: 8px;
            border-radius: 4px;
        }

        .comic-link {
            font-size: 13px;
            color: #0066cc;
            text-decoration: none;
        }

        .comic-link:active {
            color: #004499;
        }

        .news-item {
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-title {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .news-summary {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
        }

        .news-link {
            color: #0066cc;
            text-decoration: none;
        }

        .news-link:active {
            color: #004499;
        }

        .loading {
            color: #999;
            font-size: 13px;
            padding: 8px 0;
        }

        .error {
            color: #cc0000;
            font-size: 13px;
            padding: 8px 0;
        }
    </style>
</head>
<body>
    <section id="weather">
        <h2>Sää</h2>
        <div id="weatherContent"></div>
    </section>

    <section id="nameday">
        <h2>Nimipäivä</h2>
        <div id="namedayContent" class="loading">Ladataan...</div>
    </section>

    <section id="comics">
        <h2>Sarjakuvat</h2>
        <div id="comicsContent"></div>
    </section>

    <section id="news">
        <h2>Yle Uutiset</h2>
        <div id="newsContent" class="loading">Ladataan...</div>
    </section>

    <section id="hs-news">
        <h2>HS Luetuimmat</h2>
        <div id="hsNewsContent" class="loading">Ladataan...</div>
    </section>

    <section id="kulttuuri-news">
        <h2>Kulttuuri</h2>
        <div id="kulttuuriNewsContent" class="loading">Ladataan...</div>
    </section>

    <section id="visio-news">
        <h2>HS Visio</h2>
        <div id="visioNewsContent" class="loading">Ladataan...</div>
    </section>

    <section id="helsinki-news">
        <h2>Helsinki</h2>
        <div id="helsinkiNewsContent" class="loading">Ladataan...</div>
    </section>

    <script src="app.js"></script>
</body>
</html>
